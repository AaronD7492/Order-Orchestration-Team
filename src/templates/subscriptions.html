<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Subscriptions — Farm2Fork</title>
    <link rel="stylesheet" href="/static/styles.css">
    <style>
        header .icon-btn[title="Cart"],
        header .cart-badge { display: none !important; }

        .subs-page {
            max-width: 860px;
            margin: 0 auto;
            padding: 32px 20px 60px;
        }

        .subs-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .subs-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 4px;
            font-family: 'DM Sans', Arial, sans-serif;
        }

        .subs-subtitle {
            font-size: 13px;
            color: #6b7280;
            font-family: Arial, sans-serif;
        }

        .subs-count {
            font-size: 12px;
            font-weight: 700;
            background: #dcfce7;
            color: #166534;
            border: 1px solid #86efac;
            padding: 4px 12px;
            border-radius: 999px;
            white-space: nowrap;
            align-self: center;
        }

        .subs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }

        .sub-card {
            background: #fff;
            border: 1.5px solid #e2e8e2;
            border-radius: 10px;
            overflow: hidden;
        }

        .sub-card-header {
            background: #f4f6f4;
            border-bottom: 1.5px solid #e2e8e2;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .sub-product-name {
            font-size: 14px;
            font-weight: 700;
            color: #1a1a1a;
            font-family: 'DM Sans', Arial, sans-serif;
        }

        .sub-status {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            background: #dcfce7;
            color: #166534;
            border: 1px solid #86efac;
            padding: 3px 10px;
            border-radius: 999px;
            white-space: nowrap;
        }

        .sub-details {
            padding: 14px 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .sub-detail {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            font-family: Arial, sans-serif;
        }

        .sub-detail-label { color: #6b7280; }
        .sub-detail-value { font-weight: 600; color: #1a1a1a; }

        .sub-actions {
            padding: 12px 16px;
            border-top: 1px solid #f3f4f6;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .sub-action-btn {
            flex: 1;
            min-width: 80px;
            padding: 7px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            border: 1.5px solid;
            font-family: Arial, sans-serif;
            transition: all 0.15s;
        }

        .sub-action-btn.edit-freq {
            background: #fff;
            color: #2d6a2d;
            border-color: #2d6a2d;
        }
        .sub-action-btn.edit-freq:hover { background: #2d6a2d; color: #fff; }

        .sub-action-btn.edit-qty {
            background: #fff;
            color: #2d6a2d;
            border-color: #2d6a2d;
        }
        .sub-action-btn.edit-qty:hover { background: #2d6a2d; color: #fff; }

        .sub-action-btn.cancel {
            background: #fff;
            color: #dc2626;
            border-color: #fecaca;
        }
        .sub-action-btn.cancel:hover { background: #dc2626; color: #fff; border-color: #dc2626; }

        .no-subs {
            grid-column: 1 / -1;
            text-align: center;
            padding: 48px 20px;
            color: #6b7280;
            font-family: Arial, sans-serif;
            font-size: 14px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: #2d6a2d;
            font-weight: 600;
            text-decoration: none;
            margin-bottom: 20px;
            font-family: Arial, sans-serif;
        }
        .back-link:hover { text-decoration: underline; }

        /* Modals */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.45);
            z-index: 500;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.open { display: flex; }

        .modal {
            background: #fff;
            border-radius: 10px;
            width: 100%;
            max-width: 380px;
            margin: 0 16px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0,0,0,0.18);
        }

        .modal-header {
            background: #2d6a2d;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .modal-header h2 { color: #fff; font-size: 1rem; margin: 0; }

        .modal-close {
            background: none;
            border: none;
            color: #fff;
            font-size: 1.1rem;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 4px;
            line-height: 1;
        }
        .modal-close:hover { background: rgba(255,255,255,0.2); }

        .modal-body {
            padding: 20px;
        }
        .modal-body p { font-size: 14px; color: #374151; font-family: Arial, sans-serif; }

        .modal-label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 8px;
            font-family: Arial, sans-serif;
        }

        .freq-select {
            width: 100%;
            padding: 9px 12px;
            border: 1.5px solid #e2e8e2;
            border-radius: 6px;
            font-size: 14px;
            font-family: Arial, sans-serif;
            background: #fff;
        }

        .modal-quantity {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-top: 4px;
        }

        .qty-btn {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            border: 1.5px solid #e2e8e2;
            background: #fff;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            color: #2d6a2d;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
        }
        .qty-btn:hover { background: #2d6a2d; color: #fff; border-color: #2d6a2d; }

        .qty-display {
            font-size: 1.2rem;
            font-weight: 700;
            color: #1a1a1a;
            min-width: 32px;
            text-align: center;
        }

        .modal-footer {
            padding: 14px 20px;
            border-top: 1px solid #e2e8e2;
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .btn-cancel {
            padding: 9px 18px;
            border: 1.5px solid #e2e8e2;
            border-radius: 6px;
            background: #fff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            font-family: Arial, sans-serif;
        }
        .btn-cancel:hover { background: #f9fafb; }

        .btn-confirm {
            padding: 9px 18px;
            border: none;
            border-radius: 6px;
            background: #2d6a2d;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            font-family: Arial, sans-serif;
        }
        .btn-confirm:hover { background: #1e4a1e; }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>

    <div class="subs-page">
        <a href="/" class="back-link">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor">
                <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
            </svg>
            Back to Shop
        </a>

        <div class="subs-header">
            <div>
                <h1 class="subs-title">My Subscriptions</h1>
                <p class="subs-subtitle">Manage your recurring orders below.</p>
            </div>
            <span class="subs-count" id="subsCount">Loading...</span>
        </div>

        <div class="subs-grid" id="subsGrid">
            <p class="no-subs">Loading subscriptions...</p>
        </div>
    </div>

    <!-- Edit Frequency Modal -->
    <div class="modal-overlay" id="editFreqModal" role="dialog" aria-modal="true">
        <div class="modal">
            <div class="modal-header">
                <h2>Edit Frequency</h2>
                <button class="modal-close" onclick="closeEditFreq()">✕</button>
            </div>
            <div class="modal-body">
                <label class="modal-label" for="editFreqSelect">Delivery Frequency</label>
                <select class="freq-select" id="editFreqSelect">
                    <option value="daily">Daily</option>
                    <option value="weekly">Weekly</option>
                    <option value="biweekly">Bi-weekly</option>
                    <option value="monthly">Monthly</option>
                    <option value="3months">Every 3 months</option>
                    <option value="6months">Every 6 months</option>
                    <option value="yearly">Yearly</option>
                </select>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" onclick="closeEditFreq()">Cancel</button>
                <button class="btn-confirm" onclick="saveFreq()">Save</button>
            </div>
        </div>
    </div>

    <!-- Edit Quantity Modal -->
    <div class="modal-overlay" id="editQtyModal" role="dialog" aria-modal="true">
        <div class="modal">
            <div class="modal-header">
                <h2>Edit Quantity</h2>
                <button class="modal-close" onclick="closeEditQty()">✕</button>
            </div>
            <div class="modal-body">
                <span class="modal-label">Quantity</span>
                <div class="modal-quantity">
                    <button class="qty-btn" onclick="changeEditQty(-1)">−</button>
                    <span class="qty-display" id="editQtyDisplay">1</span>
                    <button class="qty-btn" onclick="changeEditQty(1)">+</button>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" onclick="closeEditQty()">Cancel</button>
                <button class="btn-confirm" onclick="saveQty()">Save</button>
            </div>
        </div>
    </div>

    <!-- Cancel Subscription Modal -->
    <div class="modal-overlay" id="cancelModal" role="dialog" aria-modal="true">
        <div class="modal">
            <div class="modal-header" style="background:#dc2626;">
                <h2>Cancel Subscription</h2>
                <button class="modal-close" onclick="closeCancelModal()">✕</button>
            </div>
            <div class="modal-body">
                <p>Are you sure you want to cancel this subscription? This cannot be undone.</p>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" onclick="closeCancelModal()">Keep Subscription</button>
                <button class="btn-confirm" style="background:#dc2626;" onclick="cancelSubscription()">Yes, Cancel</button>
            </div>
        </div>
    </div>

    <div id="footer-placeholder"></div>
    <script src="/static/components.js"></script>
    <script src="/static/subscriptions.js"></script>
</body>
</html>
